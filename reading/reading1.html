<script>
    // --- PERSISTENT 60-Minute Countdown Timer ---
    // Reset timer when first opening Reading section
    localStorage.removeItem('readingTimeLeft');
    let timeLeft = 60 * 60;
    const countdownEl = document.getElementById('countdown');

    function updateTimer() {
        if (timeLeft <= 0) {
            countdownEl.textContent = "00:00";
            alert("Time's up!");
            localStorage.removeItem('readingTimeLeft');
            clearInterval(timerInterval);
            return;
        }
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        countdownEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        
        localStorage.setItem('readingTimeLeft', timeLeft);
        timeLeft--;
    }

    const timerInterval = setInterval(updateTimer, 1000);
    updateTimer();

    // --- Text Highlight Feature ---
    const passageContainer = document.querySelector('.highlightable');

    passageContainer.addEventListener('mouseup', function() {
        const selection = window.getSelection();
        if (!selection.rangeCount) return;

        const range = selection.getRangeAt(0);
        const selectedText = selection.toString().trim();

        if (!selectedText) return;

        const parent = range.commonAncestorContainer.parentElement;
        if (parent && parent.classList.contains('highlight')) {
            parent.outerHTML = parent.innerHTML;
            selection.removeAllRanges();
            return;
        }

        try {
            const span = document.createElement('span');
            span.className = 'highlight';
            range.surroundContents(span);
        } catch (e) {
            const text = range.toString();
            const span = document.createElement('span');
            span.className = 'highlight';
            span.textContent = text;
            range.deleteContents();
            range.insertNode(span);
        }

        selection.removeAllRanges();
    });

    // --- Show Answers Function ---
    function showAnswers() {
        let answers = "--- READING PASSAGE 1 ANSWERS ---\n\n";
        for (let i = 1; i <= 13; i++) {
            const textInput = document.getElementById('r1q' + i);
            if (textInput) {
                answers += `Question ${i}: ${textInput.value.trim() || "(not answered)"}\n`;
            } else {
                const selected = document.querySelector(`input[name="r1q${i}"]:checked`);
                answers += `Question ${i}: ${selected ? selected.value : "(not answered)"}\n`;
            }
        }
        const outputBox = document.getElementById('answerOutput');
        outputBox.textContent = answers;
        outputBox.style.display = 'block';
        outputBox.scrollIntoView({ behavior: 'smooth' });
    }
</script>
