<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IELTS Listening Mock Test</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
}

.header{
    background:#003366;
    color:white;
    padding:15px;
}

.container{
    display:flex;
}

.left-panel{
    width:70%;
    padding:20px;
    border-right:1px solid #ccc;
}

.right-panel{
    width:30%;
    padding:20px;
    background:#f5f5f5;
    height:90vh;
    overflow-y:auto;
}

.question{
    margin-bottom:10px;
}

input{
    width:100%;
    padding:5px;
}

.timer{
    font-size:24px;
    font-weight:bold;
}

button{
    padding:10px;
    margin-top:20px;
}
</style>

</head>
<body>

<div class="header">
    <h2>IELTS Listening Mock Test</h2>
    <div class="timer" id="timer">30:00</div>
</div>

<div class="container">

    <div class="left-panel">

        <h3>Listening Audio</h3>

        <audio controls>
            <source src="listening-test2.mp3" type="audio/mpeg">
        </audio>

        <h3>Questions</h3>

        <p>
        Write ONE WORD AND/OR A NUMBER for each answer.
        </p>

        <p>
        This is where you will later place your Listening questions.
        </p>

    </div>

    <div class="right-panel">

        <h3>Answer Sheet</h3>

        <div id="answers"></div>

        <button onclick="submitTest()">Submit</button>

    </div>

</div>

<script>

for(let i=1;i<=40;i++){
    document.getElementById("answers").innerHTML +=
    `<div class="question">
        Question ${i}
        <input type="text" id="q${i}">
    </div>`;
}

let time = 1800;

setInterval(function(){

    let minutes = Math.floor(time/60);
    let seconds = time%60;

    document.getElementById("timer").innerHTML =
        String(minutes).padStart(2,'0') + ":" +
        String(seconds).padStart(2,'0');

    if(time>0){
        time--;
    }

},1000);

function submitTest(){
    alert("Answers submitted!");
}

</script>

</body>
</html>
