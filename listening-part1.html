<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
}

.header {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    background: #eee;
}

.container {
    display: flex;
}

/* LEFT SIDE */
.left {
    flex: 2;
    padding: 15px;
}

/* RIGHT SIDE */
.right {
    flex: 1;
    padding: 15px;
    border-left: 1px solid #ccc;
}

/* NAVIGATOR */
#navigator {
    margin-bottom: 20px;
}

#navigator button {
    width: 45px;
    height: 45px;
    margin: 3px;
    cursor: pointer;
    border: 1px solid #ccc;
    background: white;
}

#navigator button.answered {
    background: #4caf50;
    color: white;
    border: 1px solid #4caf50;
}

/* ANSWERS */
.question {
    margin-bottom: 10px;
}
</style>

</head>

<body>

<!-- TOP NAV -->
<div style="padding:10px; background:#222; color:white;">
    <a href="listening-part1.html" style="color:white; margin-right:15px;">Part 1</a>
    <a href="listening-part2.html" style="color:white; margin-right:15px;">Part 2</a>
    <a href="listening-part3.html" style="color:white;">Part 3</a>
</div>

<!-- HEADER -->
<div class="header">
    <h2>IELTS Listening Test - Part 1</h2>
    <div id="timer">30:00</div>
</div>

<!-- MAIN -->
<div class="container">

    <div class="left">
        <h3>Audio</h3>
        <audio controls>
            <source src="./part1.mp3.mp3" type="audio/mpeg">
        </audio>

        <h3>Questions 1–10</h3>
        <p>Complete the notes below. Write ONE WORD AND/OR A NUMBER.</p>

        <p>(Paste your Cambridge Part 1 questions here.)</p>
    </div>

    <div class="right">

        <h3>Question Navigator</h3>
        <div id="navigator"></div>

        <hr>

        <h3>Answer Sheet</h3>
        <div id="answers"></div>

    </div>

</div>

<!-- SCRIPT -->
<script>

let currentQuestion = 1;

// =======================
// NAVIGATION
// =======================
function goToQuestion(num){

    currentQuestion = num;

    document.getElementById("q"+num).focus();

    document.getElementById("q"+num).scrollIntoView({
        behavior: "smooth",
        block: "center"
    });

    for(let i=1;i<=10;i++){
        document.getElementById("nav"+i).style.outline = "none";
    }

    document.getElementById("nav"+num).style.outline = "2px solid #000";
}


// =======================
// BUILD QUESTIONS + NAV BUTTONS
// =======================
for(let i=1;i<=10;i++){

    // questions
    document.getElementById("answers").innerHTML +=
    `<div class="question">
        Question ${i}
        <input type="text" id="q${i}">
    </div>`;

    // nav buttons
    const btn = document.createElement("button");
    btn.innerText = i;
    btn.id = "nav" + i;

    btn.onclick = function () {
        goToQuestion(i);
    };

    document.getElementById("navigator").appendChild(btn);
}


// =======================
// SAVE + LOAD ANSWERS
// =======================
for(let i=1;i<=10;i++){

    let saved = localStorage.getItem("q"+i);

    if(saved){
        document.getElementById("q"+i).value = saved;
        document.getElementById("nav"+i).classList.add("answered");
    }

    document.getElementById("q"+i).addEventListener("input",function(){

        currentQuestion = i;

        localStorage.setItem("q"+i,this.value);

        if(this.value.trim()!==""){
            document.getElementById("nav"+i).classList.add("answered");
        } else {
            document.getElementById("nav"+i).classList.remove("answered");
        }

    });
}


// =======================
// TIMER
// =======================
let time = 1800;

setInterval(function(){

    let minutes = Math.floor(time/60);
    let seconds = time%60;

    document.getElementById("timer").innerHTML =
        String(minutes).padStart(2,'0') + ":" + String(seconds).padStart(2,'0');

    if(time > 0){
        time--;
    }

},1000);

</script>

</body>
</html>
