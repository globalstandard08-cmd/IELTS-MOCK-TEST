<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">>

<style>
#navigator {
    width: 200px;
    background: #f4f4f4;
    padding: 10px;
    border-right: 1px solid #ddd;
    height: 100vh;
    overflow-y: auto;
    margin-bottom: 0;
}

#nav-buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
}

#navigator button {
    width: 100%;
    aspect-ratio: 1 / 1;
    cursor: pointer;
    border: 1px solid #ccc;
    background: white;
}

#navigator button.answered {
    background: #4caf50;
    color: white;
    border: 1px solid #4caf50;
}

.answered{
  font-weight:bold;
}
</style>
</head>

<body>
<div style="padding:10px; background:#222; color:white;">
    <a href="listening-part1.html" style="color:white; margin-right:15px;">Part 1</a>
    <a href="listening-part2.html" style="color:white; margin-right:15px;">Part 2</a>
    <a href="listening-part3.html" style="color:white;">Part 3</a>
</div>
<div class="header">
    <h2>IELTS Listening Test - Part 1</h2>
    <div class="timer" id="timer">30:00</div>
</div>

<div class="container">
  <!-- QUESTION NAVIGATOR -->
<div id="navigator">
    <h3>Questions</h3>
    <div id="nav-buttons">
        <!-- Buttons will be generated by JavaScript -->
    </div>

<div class="left">

<h3>Audio</h3>

<audio controls>
    <source src="./part1.mp3.mp3" type="audio/mpeg">
</audio>

<h3>Questions 1–10</h3>

<p>
Complete the notes below.
Write ONE WORD AND/OR A NUMBER for each answer.
</p>

<p>
(Paste your Cambridge Part 1 questions here.)
</p>

</div>
<div class="right">

<h3>Question Navigator</h3>

<div id="navigator"></div>

<hr>

<h3>Answer Sheet</h3>

<div id="answers"></div>

</div>

</div>


<script>

for(let i=1;i<=10;i++){

    document.getElementById("answers").innerHTML +=
    `<div class="question">
        Question ${i}
        <input type="text" id="q${i}">
    </div>`;

   const btn = document.createElement("button");
btn.innerText = i;
btn.id = "nav" + i;

btn.onclick = function () {
    goToQuestion(i);
};

document.getElementById("navigator").appendChild(btn);

function goToQuestion(num){
    currentQuestion = num;

    document.getElementById("q"+num).focus();
  document.getElementById("q"+num).scrollIntoView({behavior:"smooth", block:"center"});

    document.getElementById("q"+num).scrollIntoView({
        behavior: "smooth",
        block: "center"
    });

    // remove highlight from all buttons
    for(let i=1;i<=10;i++){
        document.getElementById("nav"+i).style.outline = "none";
    }

    // highlight current button
    document.getElementById("nav"+num).style.outline = "2px solid #000";
}

for(let i=1;i<=10;i++){

    let saved = localStorage.getItem("q"+i);

    if(saved){
        document.getElementById("q"+i).value = saved;
        document.getElementById("nav"+i).classList.add("answered");
    }

    document.getElementById("q"+i).addEventListener("input",function(){
      currentQuestion = i;

        localStorage.setItem("q"+i,this.value);

        if(this.value.trim()!==""){
            document.getElementById("nav"+i).classList.add("answered");
        }else{
            document.getElementById("nav"+i).classList.remove("answered");
        }

    });
}

let time = 1800;

setInterval(function(){

    let minutes = Math.floor(time/60);
    let seconds = time%60;

    document.getElementById("timer").innerHTML =
        String(minutes).padStart(2,'0')
        + ":" +
        String(seconds).padStart(2,'0');

    if(time > 0){
        time--;
    }

},1000);

</script>

</body>
</html>
