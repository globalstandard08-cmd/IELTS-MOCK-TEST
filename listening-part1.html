<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IELTS Listening - Part 1</title>

<style>
#navigator{
  margin-bottom:20px;
}

#navigator button{
  width:45px;
  height:45px;
  margin:3px;
  cursor:pointer;
}

.answered{
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
    <h2>IELTS Listening Test - Part 1</h2>
    <div class="timer" id="timer">30:00</div>
</div>

<div class="container">

<div class="left">

<h3>Audio</h3>

<audio controls>
    <source src="./part1.mp3.mp3" type="audio/mpeg">
</audio>

<h3>Questions 1–10</h3>

<p>
Complete the notes below.
Write ONE WORD AND/OR A NUMBER for each answer.
</p>

<p>
(Paste your Cambridge Part 1 questions here.)
</p>

</div>
<div class="right">

<h3>Question Navigator</h3>

<div id="navigator"></div>

<hr>

<h3>Answer Sheet</h3>

<div id="answers"></div>

</div>

</div>


<script>

for(let i=1;i<=10;i++){

    document.getElementById("answers").innerHTML +=
    `<div class="question">
        Question ${i}
        <input type="text" id="q${i}">
    </div>`;

    document.getElementById("navigator").innerHTML +=
    `<button onclick="goToQuestion(${i})" id="nav${i}">
        ${i}
    </button>`;
}

function goToQuestion(num){
    document.getElementById("q"+num).focus();
}

for(let i=1;i<=10;i++){

    let saved = localStorage.getItem("q"+i);

    if(saved){
        document.getElementById("q"+i).value = saved;
        document.getElementById("nav"+i).classList.add("answered");
    }

    document.getElementById("q"+i).addEventListener("input",function(){

        localStorage.setItem("q"+i,this.value);

        if(this.value.trim()!==""){
            document.getElementById("nav"+i).classList.add("answered");
        }else{
            document.getElementById("nav"+i).classList.remove("answered");
        }

    });
}

let time = 1800;

setInterval(function(){

    let minutes = Math.floor(time/60);
    let seconds = time%60;

    document.getElementById("timer").innerHTML =
        String(minutes).padStart(2,'0')
        + ":" +
        String(seconds).padStart(2,'0');

    if(time > 0){
        time--;
    }

},1000);

</script>

</body>
</html>
